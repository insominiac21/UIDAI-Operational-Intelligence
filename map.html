<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geospatial Hub | UIDAI Operational Intelligence</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        .map-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            height: calc(100vh - 60px);
            gap: 20px;
        }
        #map {
            border-radius: 1rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            background: #f1f5f9;
        }
        .side-intel-container {
            background: white;
            border-radius: 1rem;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            overflow-y: auto;
            padding: 20px;
        }
        .intel-placeholder {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            text-align: center;
        }
        .legend-abs {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
        }
    </style>
</head>
<body style="overflow: hidden;">
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo">
                <h1>UIDAI 2026<br><small>Geospatial Engine</small></h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fa-solid fa-gauge-high"></i> Overview</a></li>
                <li><a href="map.html" class="active"><i class="fa-solid fa-earth-asia"></i> Geospatial Hub</a></li>
                <li><a href="clusters.html"><i class="fa-solid fa-diagram-project"></i> Archetype Intel</a></li>
                <li><a href="methodology.html"><i class="fa-solid fa-terminal"></i> Methodology</a></li>
            </ul>
        </div>

        <!-- Main Workspace -->
        <main class="main-content">
            <div class="map-layout">
                <div style="position: relative;">
                    <div id="map" style="height: 100%;"></div>
                    
                    <div class="legend-abs">
                        <div style="font-weight: 700; margin-bottom: 8px; font-size: 0.8rem;">PRIORITY DOMAINS</div>
                        <div class="legend-row"><span class="dot" style="background:#d946ef"></span> Critical (75-100)</div>
                        <div class="legend-row"><span class="dot" style="background:#8b5cf6"></span> High (50-75)</div>
                        <div class="legend-row"><span class="dot" style="background:#06b6d4"></span> Standard (25-50)</div>
                        <div class="legend-row"><span class="dot" style="background:#0d9488"></span> Baseline (0-25)</div>
                    </div>
                </div>

                <div class="side-intel-container" id="map-side-intel">
                    <div class="intel-placeholder">
                        <i class="fa-solid fa-location-crosshairs" style="font-size: 3rem; opacity: 0.2; margin-bottom: 20px;"></i>
                        <p>Hover over a district node to extract real-time intelligence.</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="js/main.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
